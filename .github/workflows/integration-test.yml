name: Integration Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  integration-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Build and start all services
        run: docker compose up -d --build
      - name: Wait for services to be healthy
        run: sleep 15
      - name: Run stock-service tests
        env:
          PGHOST: localhost
          PGUSER: dev
          PGPASSWORD: devpassword
          PGDATABASE: cafeteria
          PGPORT: "5432"
          REDIS_URL: redis://localhost:6379
        run: |
          cd services/stock-service
          npm install
          npm test
      - name: Run kitchen-queue tests
        env:
          RABBITMQ_URL: amqp://localhost:5672
          REDIS_URL: redis://localhost:6379
        run: |
          docker compose stop notification-hub
          cd services/kitchen-queue
          npm install
          npm test
      - name: Show docker compose logs on failure
        if: failure()
        run: docker compose logs
