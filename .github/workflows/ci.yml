name: CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        service: [frontend, identity-provider, order-gateway, stock-service, kitchen-queue, notification-hub]

    services:
      redis:
        image: redis
        ports:
          - 6379:6379
      postgres:
        image: postgres:14
        env:
          POSTGRES_USER: dev
          POSTGRES_PASSWORD: devpassword
          POSTGRES_DB: cafeteria
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      rabbitmq:
        image: rabbitmq:3-management
        ports:
          - 5672:5672
          - 15672:15672
        options: >-
          --health-cmd "rabbitmqctl status"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
    - uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: services/${{ matrix.service }}/package-lock.json

    - name: Install dependencies
      run: npm install
      working-directory: services/${{ matrix.service }}

    - name: Run build
      run: |
        if [ "${{ matrix.service }}" = "frontend" ]; then
          npm run build
        else
          # For other services, just check if index.js exists for now
          ls index.js
        fi
      working-directory: services/${{ matrix.service }}

    - name: Run linter
      if: matrix.service == 'frontend'
      run: npm run lint
      working-directory: services/${{ matrix.service }}

    - name: Run tests (placeholder)
      run: |
        if grep -q '"test":' package.json; then
          npm test
        else
          echo "No tests defined for ${{ matrix.service }}"
        fi
      working-directory: services/${{ matrix.service }}
